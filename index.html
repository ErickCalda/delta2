<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Diferenciales</title>
</head>

<body>

    <div id="app">

        <header>
            <h1>Propagación de Error en Tanque Esférico</h1>
        </header>

        <main>

            <section id="graph-panel">
                <h2>Gráfico Matemático</h2>
                <div id="graph"></div>
            </section>

      

        </main>

        <section id="controls">

          <div class="control" style="margin-top: 15px; display: flex; align-items: center; gap: 8px;">
    <input type="checkbox" id="toggle-error-real" style="width: 18px; height: 18px; cursor: pointer;">
    <label for="toggle-error-real" style="font-weight: bold; color: #e53935; cursor: pointer;">
        Mostrar Error Real (Truncamiento)
    </label>
</div>

            <div class="control">
                <label>Radio (m)</label>
                <input
                    type="range"
                    id="radio"
                    min="1"
                    max="10"
                    value="4"
                    step="0.1">
                <span id="radio-value">4</span>
            </div>

            <div class="control">
                <label>Error dr (m)</label>
                <input
                    type="range"
                    id="dr"
                    min="0.1"
                    max="2"
                    value="1"
                    step="0.1">
                <span id="dr-value">1</span>
            </div>

        </section>

        <section id="results">

            <div class="card">
                <h3>Volumen</h3>
                <p id="volumen"></p>
            </div>

            <div class="card">
                <h3>Diferencial</h3>
                <p id="dv"></p>
            </div>

            <div class="card">
                <h3>Error %</h3>
                <p id="error"></p>
            </div>
            <div class="card">
        <h3>Error de Truncamiento</h3>
        <p id="error-truncamiento">0.00 m³</p>
    </div>


        </section>

    </div>

    <script type="module" src="/src/main.js"></script>

</body>
</html>
